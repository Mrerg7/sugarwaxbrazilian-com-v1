name = "sugarwaxbrazilian-com-v1"
main = "./worker/index.ts"
compatibility_date = "2026-07-08"
workers_dev = false
preview_urls = false

routes = [
  { pattern = "sugarbrazilianwax.com", custom_domain = true },
  { pattern = "www.sugarbrazilianwax.com", custom_domain = true },
]

[assets]
directory = "./dist"
binding = "ASSETS"
html_handling = "force-trailing-slash"
not_found_handling = "404-page"
run_worker_first = true

[observability]
enabled = true
